services:
  db:
    image: postgres:15-alpine
    container_name: meishibridge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meishibridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: meishibridge-api
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/meishibridge
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: meishibridge-web
    ports:
      - "3002:3000"
    volumes:
      - ../web:/app
      - /app/node_modules
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NUXT_PUBLIC_APP_URL=http://localhost:3002
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - api

volumes:
  postgres_data:
